services:
  - type: web
    name: care4animals-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --chdir backend app.main:app
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard or use Supabase
      - key: FRONTEND_URL
        sync: false # Set to your Vercel URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
